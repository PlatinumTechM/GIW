<svg width="300" height="300" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <g stroke="black" stroke-width="4" stroke-linejoin="round">
    <!-- Outer shape -->
    <polygon points="50,10 150,10 180,40 180,160 150,190 50,190 20,160 20,40"></polygon>

    <!-- Inner frame -->
    <polygon points="70,40 130,40 150,60 150,140 130,160 70,160 50,140 50,60"></polygon>

    <!-- Top facets -->
    <line x1="50" y1="10" x2="70" y2="40"></line>
    <line x1="150" y1="10" x2="130" y2="40"></line>
    <line x1="70" y1="40" x2="130" y2="40"></line>

    <!-- Bottom facets -->
    <line x1="50" y1="190" x2="70" y2="160"></line>
    <line x1="150" y1="190" x2="130" y2="160"></line>
    <line x1="70" y1="160" x2="130" y2="160"></line>

    <!-- Side lines -->
    <line x1="20" y1="40" x2="50" y2="60"></line>
    <line x1="180" y1="40" x2="150" y2="60"></line>
    <line x1="20" y1="160" x2="50" y2="140"></line>
    <line x1="180" y1="160" x2="150" y2="140"></line>
  </g>
</svg>