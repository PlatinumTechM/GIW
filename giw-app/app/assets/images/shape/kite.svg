<svg width="200" height="200" viewBox="0 0 100 140" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Outer Kite Shape -->
  <polygon points="50,5 90,70 50,135 10,70" stroke="black" stroke-width="2" fill="none"></polygon>

  <!-- Inner Facets -->
  <polygon points="50,20 75,70 50,120 25,70" stroke="black" stroke-width="1.5" fill="none"></polygon>

  <polygon points="50,35 65,70 50,105 35,70" stroke="black" stroke-width="1.5" fill="none"></polygon>

  <!-- Center Line -->
  <line x1="50" y1="5" x2="50" y2="135" stroke="black" stroke-width="1"></line>

  <!-- Horizontal Facet -->
  <line x1="25" y1="70" x2="75" y2="70" stroke="black" stroke-width="1"></line>

  <!-- Diagonal Facets -->
  <line x1="50" y1="20" x2="25" y2="70" stroke="black" stroke-width="1"></line>
  <line x1="50" y1="20" x2="75" y2="70" stroke="black" stroke-width="1"></line>

  <line x1="50" y1="120" x2="25" y2="70" stroke="black" stroke-width="1"></line>
  <line x1="50" y1="120" x2="75" y2="70" stroke="black" stroke-width="1"></line>
</svg>