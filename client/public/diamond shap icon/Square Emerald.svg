<svg width="200" height="200" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Outer Square -->
  <rect x="5" y="5" width="90" height="90" stroke="black" stroke-width="2" fill="none"></rect>

  <!-- Step Cuts -->
  <rect x="15" y="15" width="70" height="70" stroke="black" stroke-width="1.5" fill="none"></rect>
  <rect x="25" y="25" width="50" height="50" stroke="black" stroke-width="1.5" fill="none"></rect>
  <rect x="35" y="35" width="30" height="30" stroke="black" stroke-width="1.5" fill="none"></rect>

  <!-- Center Facet -->
  <polygon points="50,40 60,50 50,60 40,50" stroke="black" stroke-width="1.5" fill="none"></polygon>

  <!-- Corner Facets -->
  <line x1="5" y1="5" x2="35" y2="35" stroke="black" stroke-width="1"></line>
  <line x1="95" y1="5" x2="65" y2="35" stroke="black" stroke-width="1"></line>
  <line x1="5" y1="95" x2="35" y2="65" stroke="black" stroke-width="1"></line>
  <line x1="95" y1="95" x2="65" y2="65" stroke="black" stroke-width="1"></line>
</svg>